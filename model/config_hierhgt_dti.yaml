# HierHGT-DTI config (SubPocket-HGT, packed backend)

model:
  drug_encoder:
    in_dim: 74

  protein_encoder:
    in_dim: 320

  strict_feature_dims: true

  shared_stem:
    type: mlp
    dropout: 0.16

  relational_view:
    debug_checks: false
    packed_backend:
      require_torch_scatter: true
      attn_eps: 1.0e-8
    drug_use_bond_types: false
    protein_use_seq_gap_types: false
    protein_use_contact_bin_types: false
    protein_edge_type_dim: 3
    protein_seq_gap_bin_dim: 4
    protein_contact_bin_dim: 5
    protein_edge_granularity: fine
    coarse_other_policy: drop
    subpocket:
      cross_edge_warmup_epochs: 5
      cross_edge_warmup_start: 0.1
      disable_sub_pocket_cross: true
      aggregation: attention            # mean | attention | gated
      flow_gate:
        enabled: false
        hidden_dim: 64
        init_bias: -2.0
      relation_msg_gate:
        l1_lambda: 1.0e-4
        init_bias: 0.0
        temperature: 1.0
        degree_scale: 1.0
        freeze: false
    hgt:
      hidden_dim: 128
      n_heads: 4
      n_layers: 2
      dropout: 0.15

  predictor:
    mode: single_global   # single_global | single_token | fusion
    hidden_dims: [256, 128, 64]
    dropout: 0.16
    token_bilinear:
      proj_dim: 128
      dropout: 0.16
    fusion:
      gate_hidden_dim: 64
      branch_dropout: 0.0

data:
  smiles_col: SMILES
  protein_col: Protein
  label_col: Y

  batch_size: 128
  num_workers: 8
  pin_memory: true
  cache_in_memory: true

  drug_cache_dirs:
    - ../data/drug_cache
  protein_cache_dirs:
    - ../data/esm_cache

  train_file: ../data/BioSnap/cold_protein/train.csv
  val_file: ../data/BioSnap/cold_protein/val.csv
  test_file: ../data/BioSnap/cold_protein/test.csv

train:
  lr: 1.0e-4
  rel_lr: 5.8e-4
  epochs: 100
  weight_decay: 1.5e-4

  lr_scheduler: reduce_on_plateau
  lr_factor: 0.5
  lr_patience: 3
  lr_min: 0.000001

  early_stopping_patience: 8
  early_stopping_delta: 0.0003

  grad_clip_norm: 0.5

  amp:
    enabled: true
    dtype: float16

loss:
  type: bce

evaluation:
  threshold: 0.5

output:
  output_dir: ./output/biosnap_cold_protein
  log_file: training.log

device:
  use_cuda: true
  cuda_device: 0

seed:
  seed: 42
  deterministic: true
  benchmark: false
